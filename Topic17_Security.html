<div class="presentation" id="presentation"></div>

<div class="nav-bar">
  <button id="prevBtn" onclick="changeSlide(-1)">◀ Prev</button>
  <span class="slide-counter" id="slideCounter">1 / 1</span>
  <div class="progress-dots" id="progressDots"></div>
  <button id="nextBtn" onclick="changeSlide(1)">Next ▶</button>
</div>
<div class="kbd-hint">← → arrow keys to navigate</div>

<script>
const slides = [];
function addSlide(html) { slides.push(html); }

function renderSlides() {
  const container = document.getElementById('presentation');
  slides.forEach((html, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.dataset.slide = i + 1;
    div.innerHTML = html;
    container.appendChild(div);
  });
  renderDots();
  updateNav();
}

function renderDots() {
  const dots = document.getElementById('progressDots');
  if (!dots) return;
  dots.innerHTML = '';
  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === currentSlide ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    dots.appendChild(dot);
  });
}

let currentSlide = 0;

function changeSlide(dir) {
  const next = currentSlide + dir;
  if (next < 0 || next >= slides.length) return;
  goToSlide(next);
}

function goToSlide(idx) {
  const all = document.querySelectorAll('.slide');
  all.forEach(s => s.classList.remove('active'));
  all[idx].classList.add('active');
  currentSlide = idx;
  const counter = document.getElementById('slideCounter');
  if (counter) counter.textContent = (idx + 1) + ' / ' + slides.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === slides.length - 1;
  renderDots();
  all[idx].scrollTop = 0;
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeSlide(-1);
});

function updateNav() {
  const counter = document.getElementById('slideCounter');
  if (counter) counter.textContent = '1 / ' + slides.length;
  document.getElementById('prevBtn').disabled = true;
  if (slides.length <= 1) document.getElementById('nextBtn').disabled = true;
}

// ==================================================================
// SLIDE 16 – PRIVATE KEY FOR SIGNING, PUBLIC KEY FOR VERIFYING
// ==================================================================
addSlide(`
  <div class="section-badge">17.1 Digital Signatures</div>
  <h2>Private Key for Signing, Public Key for Verifying</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="worked-example">
    <h4>Creating a Digital Signature</h4>
    <ol>
      <li>Sender creates a <strong>message</strong></li>
      <li>Sender creates a <strong>hash</strong> of the message (a fixed-length digest)</li>
      <li>Sender <strong>encrypts the hash</strong> using their <strong>private key</strong></li>
      <li>The encrypted hash becomes the <strong>digital signature</strong></li>
      <li>Sender publishes the <strong>message + signature</strong></li>
    </ol>
  </div>
  <div class="worked-example mt-6">
    <h4>Verifying a Digital Signature</h4>
    <ol>
      <li>Receiver gets the message + signature</li>
      <li>Receiver <strong>decrypts the signature</strong> using the sender's <strong>public key</strong> → obtains the original hash</li>
      <li>Receiver <strong>hashes the received message</strong> using the same algorithm</li>
      <li>Receiver <strong>compares both hashes</strong></li>
      <li>If they match → message is authentic and unchanged</li>
    </ol>
  </div>
`);

// ==================================================================
// SLIDE 17 – WHAT A DIGITAL SIGNATURE PROVES
// ==================================================================
addSlide(`
  <div class="section-badge">17.1 Digital Signatures</div>
  <h2>What a Digital Signature Proves</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div class="card">
      <h4>✅ What It Provides</h4>
      <ul>
        <li><strong>Authentication:</strong> The message came from the claimed sender (because only the sender has the private key that created the signature)</li>
        <li><strong>Integrity:</strong> The message has not been altered since signing (because the hash comparison would fail if changed)</li>
        <li><strong>Non-repudiation:</strong> The sender cannot easily deny having signed the message</li>
      </ul>
    </div>
    <div class="card">
      <h4>❌ What It Does NOT Provide</h4>
      <ul>
        <li><strong>Confidentiality</strong> — the message itself may still be readable by anyone</li>
        <li>Protection from someone <strong>reading</strong> the message</li>
      </ul>
    </div>
  </div>
  <div class="exam-tip-box mt-6">
    <h4>Exam Tip</h4>
    <p>Do <strong>NOT</strong> confuse encryption for privacy with digital signatures for verification. They use similar key ideas but solve different problems.</p>
  </div>
`);

addSlide(`
  <div class="section-badge">17.1 Hybrid Encryption</div>
  <h2>Why Combine Symmetric and Asymmetric Encryption?</h2>

    <div>
      <div class="card">
        <h4>The Reasoning</h4>
        <ul>
          <li><strong>Symmetric</strong> encryption is fast but has the key-sharing problem</li>
          <li><strong>Asymmetric</strong> encryption solves key sharing but is slower</li>
          <li>Many secure systems combine both methods = <strong>hybrid encryption</strong></li>
        </ul>
      </div>
      <div class="card mt-6">
        <h4>Typical Hybrid Process</h4>
        <ol>
          <li>Asymmetric encryption is used to <strong>securely exchange a session key</strong></li>
          <li>Symmetric encryption uses the session key to <strong>encrypt the main data</strong></li>
          <li>The session key is <strong>temporary</strong> and discarded after the session</li>
        </ol>
      </div>
    </div>
    <div>
      <div class="key-term-box">
        <h4>Key Term</h4>
        <p><strong>Session key:</strong> A temporary symmetric key used for one communication session. It is generated fresh for each new connection and discarded afterward.</p>
      </div>
      <div class="exam-tip-box mt-6">
        <h4>Exam Tip</h4>
        <p>This hybrid approach is central to <strong>SSL/TLS</strong>. Asymmetric methods help establish trust and exchange keys; symmetric encryption handles the bulk data because it is faster.</p>
      </div>
    </div>
  </div>
`);

// SLIDE 31 – WHY DIGITAL CERTIFICATES ARE NEEDED
// ==================================================================
addSlide(`
  <div class="section-badge">17.1 Digital Certificates</div>
  <h2>Why Digital Certificates Are Needed</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>The Problem</h4>
        <p>If <strong>anyone</strong> can publish a public key, how do we know who it really belongs to?</p>
        <p style="margin-top:6px;">An attacker could publish a public key claiming to be a bank. Without verification, users would send encrypted data to the attacker.</p>
      </div>
    </div>
    <div>
      <div class="card">
        <h4>The Solution</h4>
        <ul>
          <li>A trusted <strong>Certificate Authority (CA)</strong> verifies the owner's identity</li>
          <li>The CA <strong>signs</strong> the certificate with its own private key</li>
          <li><strong>Browsers and operating systems</strong> trust recognised CAs</li>
          <li>Users can trust that the public key belongs to the named organisation</li>
        </ul>
      </div>
      <div class="key-term-box mt-6">
        <h4>Key Term</h4>
        <p><strong>Chain of trust:</strong> A hierarchy where a trusted root CA signs intermediate CA certificates, which in turn sign end-entity certificates. This allows trust to be delegated.</p>
      </div>
    </div>
  </div>
`);

addSlide(`

      <li>CA <strong>issues</strong> a digital certificate</li>

addSlide(`
  <div class="section-badge">17.1 Certificates vs Signatures</div>
  <h2>Digital Certificates vs Digital Signatures</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <table>
    <thead>
      <tr><th>Feature</th><th>Digital Certificate</th><th>Digital Signature</th></tr>
    </thead>

      <tr><td><strong>Purpose</strong></td><td>Binds identity to a public key</td><td>Proves origin and integrity of data</td></tr>

      <tr><td><strong>Contains</strong></td><td>Public key + identity details</td><td>Encrypted hash of the data</td></tr>
      <tr><td><strong>Key used</strong></td><td>CA's private key to sign; subject's public key inside</td><td>Sender's private key to create; sender's public key to verify</td></tr>
      <tr><td><strong>Used for</strong></td><td>Trusting a public key's owner</td><td>Verifying a message/document</td></tr>
      <tr><td><strong>Example</strong></td><td>Website TLS certificate</td><td>Signed software update</td></tr>
    </tbody>
  </table>
  <div class="exam-tip-box mt-6">
    <h4>Exam Tip</h4>
    <p>A <strong>certificate</strong> is NOT the same as a <strong>signature</strong>. A certificate proves <strong>who owns a public key</strong>. A signature proves <strong>a message was signed</strong> using the matching private key.</p>
  </div>
`);

// SLIDE 36 – PRODUCING A DIGITAL SIGNATURE

addSlide(`
  <div class="section-badge">17.1 Digital Signatures</div>

  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="worked-example">
    <h4>Step-by-Step: Creating a Digital Signature</h4>
    <ol>
      <li>Sender creates a <strong>message or document</strong></li>

      <li>The encrypted digest is the <strong>digital signature</strong></li>
      <li>Sender provides their <strong>digital certificate</strong> alongside the signed message</li>

  </div>

// ==================================================================
// SLIDE 37 – VERIFYING A DIGITAL SIGNATURE
// ==================================================================
addSlide(`
  <div class="section-badge">17.1 Digital Signatures</div>
  <h2>Verifying a Digital Signature</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="worked-example">
    <h4>Step-by-Step: Verifying a Digital Signature</h4>
    <ol>
      <li>Receiver obtains sender's <strong>digital certificate</strong></li>
      <li>Receiver checks the certificate is <strong>valid and trusted</strong></li>
      <li>Receiver <strong>extracts the sender's public key</strong> from the certificate</li>
      <li>Receiver uses the public key to <strong>decrypt the digital signature</strong> → obtains the original hash</li>
      <li>Receiver <strong>hashes the received document</strong> using the same algorithm</li>
      <li>Receiver <strong>compares both hashes</strong></li>
    </ol>
  </div>
  <div class="grid-2 mt-6">
    <div class="callout success">
      <strong>✅ Hashes match:</strong> The message is authentic and unchanged. The signature is valid.
    </div>
    <div class="callout warn">
      <strong>❌ Hashes differ:</strong> Message was altered or signature is invalid. Do not trust.
    </div>
  </div>
`);

// ==================================================================
// SLIDE 38 – WHAT DIGITAL SIGNATURES PROVIDE
// ==================================================================
addSlide(`
  <div class="section-badge">17.1 Digital Signatures</div>
  <h2>What Digital Signatures Provide</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>✅ Digital Signatures Provide</h4>
        <ul>
          <li><strong>Authentication:</strong> Confirms who signed the data (only the sender has the private key)</li>
          <li><strong>Integrity:</strong> Detects any changes made after signing (hash comparison reveals tampering)</li>
          <li><strong>Non-repudiation:</strong> The signer cannot easily deny having signed</li>
        </ul>
      </div>
    </div>
    <div>
      <div class="card">
        <h4>❌ Digital Signatures Do NOT Automatically Provide</h4>
        <ul>
          <li><strong>Confidentiality</strong> — the message may still be readable by anyone</li>
          <li>Protection from someone <strong>reading</strong> the message</li>
        </ul>
      </div>
      <div class="callout info mt-6">
        <strong>To keep a signed message private:</strong> First <strong>sign</strong> it for verification, then <strong>encrypt</strong> it for confidentiality. Both can be used together.
      </div>
    </div>
  </div>
`);

    <div class="common-mistake-box">

      <p>Digital signatures provide <strong>authentication and integrity</strong>, NOT confidentiality.</p>
