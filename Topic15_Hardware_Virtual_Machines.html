<script>
const slides = [];
function addSlide(html) { slides.push(html); }
function renderSlides() {
  const container = document.getElementById('presentation');
  slides.forEach((html, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.dataset.slide = i + 1;
    div.innerHTML = html;
    container.appendChild(div);
  });
  renderDots();
  updateNav();
}
function renderDots() {
  const dots = document.getElementById('progressDots');
  dots.innerHTML = '';
  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === currentSlide ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    dots.appendChild(dot);
  });
}
let currentSlide = 0;
function changeSlide(dir) {
  const next = currentSlide + dir;
  if (next < 0 || next >= slides.length) return;
  goToSlide(next);
}
function goToSlide(idx) {
  const all = document.querySelectorAll('.slide');
  all.forEach(s => s.classList.remove('active'));
  all[idx].classList.add('active');
  currentSlide = idx;
  document.getElementById('slideCounter').textContent = (idx + 1) + ' / ' + slides.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === slides.length - 1;
  renderDots();
  all[idx].scrollTop = 0;
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeSlide(-1);
});
function updateNav() {
  document.getElementById('slideCounter').textContent = '1 / ' + slides.length;
  document.getElementById('prevBtn').disabled = true;
  if (slides.length <= 1) document.getElementById('nextBtn').disabled = true;
}

// SLIDE 3 – WHAT IS AN INSTRUCTION SET?
// ==================================================================
addSlide(`
  <div class="section-badge">15.1 Processors</div>
  <h2>What Is an Instruction Set?</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>Definition</h4>
        <p>An <strong>instruction set</strong> is the complete collection of machine-code instructions that a processor can understand and execute.</p>
        <p style="margin-top:6px;">Examples of instructions:</p>
        <ul>
          <li><span class="inline-code">LOAD</span> — copy data from memory to a register</li>
          <li><span class="inline-code">STORE</span> — copy data from a register to memory</li>
          <li><span class="inline-code">ADD</span> — add two values</li>
          <li><span class="inline-code">COMPARE</span> — compare two values</li>
          <li><span class="inline-code">JUMP</span> — branch to a different instruction</li>
        </ul>
      </div>
    </div>
    <div>
      <div class="key-term-box">
        <h4>Key Term</h4>
        <p><strong>Instruction set:</strong> The set of all machine-code instructions a processor can execute. Different processor families (ARM, x86, RISC-V) have different instruction sets.</p>
      </div>
      <div class="card" style="margin-top:6px;">
        <h4>Two Main Design Philosophies</h4>
        <ul>
          <li><strong>RISC</strong> (Reduced Instruction Set Computer) — many simple instructions</li>
          <li><strong>CISC</strong> (Complex Instruction Set Computer) — fewer, more powerful instructions</li>
        </ul>
      </div>
      <div class="callout info mt-6">
        <strong>Analogy:</strong> RISC is like using many simple Lego bricks to build anything. CISC is like having specialised pre-built pieces that do complex tasks in one step.
      </div>
    </div>
  </div>
`);

addSlide(`
  <div class="section-badge">15.1 Processors</div>
  <h2>RISC Processor — Main Features</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">

        <ul>
          <li><strong>Small</strong> instruction set (typically 50–100 instructions)</li>
          <li><strong>Simple</strong>, single-cycle instructions</li>
          <li><strong>Fixed-length</strong> instructions</li>
          <li>Most instructions complete in <strong>one clock cycle</strong></li>
          <li><strong>Load/store architecture</strong> — only LOAD and STORE access memory</li>
          <li><strong>Many general-purpose registers</strong> (typically 32 or more)</li>
          <li>Easier to <strong>pipeline</strong> because instructions are uniform</li>
          <li>Simpler control unit (less hardware complexity)</li>
        </ul>
      </div>
      <div class="key-term-box mt-6">
        <h4>Key Term</h4>
        <p><strong>Load/store architecture:</strong> Memory is accessed mainly by separate LOAD and STORE instructions. Arithmetic/logic operations work only on registers, not directly on memory.</p>
      </div>
    </div>
    <div>
      <div class="worked-example">
        <h4>Example RISC Instructions</h4>
        <div class="code-block">
LOAD R1, X     <span style="color:#546e7a;">// Load value at memory address X into R1</span>
LOAD R2, Y     <span style="color:#546e7a;">// Load value at memory address Y into R2</span>
ADD  R3, R1, R2 <span style="color:#546e7a;">// R3 = R1 + R2</span>
STORE R3, Z    <span style="color:#546e7a;">// Store result to memory address Z</span>
        </div>
        <p style="font-size:0.88rem; margin-top:4px;">Each instruction does <strong>one simple operation</strong>. Multiple steps are needed for complex tasks, but each step is fast and predictable.</p>

        <h4>Examples of RISC Processors</h4>
        <ul>
          <li><strong>ARM</strong> — used in most smartphones and tablets</li>

          <li><strong>MIPS</strong> — used in some embedded systems</li>
        </ul>
      </div>
    </div>

`);

addSlide(`
  <div class="section-badge">15.1 Processors</div>
  <h2>CISC Processor — Main Features</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>Key Features of CISC</h4>
        <ul>
          <li><strong>Large</strong> instruction set (hundreds of instructions)</li>
          <li><strong>Complex</strong> instructions that perform multi-step tasks</li>
          <li><strong>Variable-length</strong> instructions</li>
          <li>Instructions may take <strong>several clock cycles</strong></li>
          <li>Many instructions can access memory directly</li>
          <li><strong>Fewer registers</strong> compared with RISC</li>
          <li>More complex <strong>decoding hardware</strong> needed</li>
          <li>Harder to pipeline effectively</li>
        </ul>
      </div>
    </div>
    <div>
      <div class="worked-example">
        <h4>Example CISC Instruction</h4>
        <div class="code-block">

        </div>
        <p style="font-size:0.88rem; margin-top:4px;">A single CISC instruction can load values from memory, perform the operation, and store the result back — all in <strong>one instruction</strong>. This reduces the number of instructions needed, but each instruction is more complex and may take multiple clock cycles.</p>
      </div>
      <div class="card mt-6">
        <h4>Examples of CISC Processors</h4>
        <ul>
          <li><strong>x86</strong> — Intel and AMD desktop/laptop processors</li>

        </ul>
      </div>
      <div class="callout info mt-6">
        <strong>Key idea:</strong> CISC aims to reduce the <em>number of instructions</em> in a program. However, each instruction may need more clock cycles and more complex decoding.
      </div>
    </div>
  </div>
`);

addSlide(`

addSlide(`
  <div class="section-badge">15.1 Processors</div>
  <h2>Pipeline Hazards</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <p>Pipeline hazards are situations that prevent the next instruction from executing in the next clock cycle.</p>
  <div class="grid-3" style="margin-top:8px;">
    <div class="card">
      <h4>Data Hazard</h4>
      <p>An instruction needs data that has not yet been produced by a previous instruction.</p>
      <p style="margin-top:4px; font-size:0.85rem;"><strong>Example:</strong></p>
      <div class="code-block" style="font-size:0.75rem;">
ADD R1, R2, R3  <span style="color:#546e7a;">// R1 = R2 + R3</span>
SUB R4, R1, R5  <span style="color:#546e7a;">// Needs R1 (not ready)</span>
      </div>
    </div>
    <div class="card">
      <h4>Control Hazard</h4>
      <p>A branch or jump changes the flow of instructions. The pipeline may have already fetched the wrong next instruction.</p>
      <p style="margin-top:4px; font-size:0.85rem;"><strong>Example:</strong></p>
      <div class="code-block" style="font-size:0.75rem;">
JUMP label
LOAD R1, X  <span style="color:#546e7a;">// May not be executed</span>
      </div>
    </div>
    <div class="card">
      <h4>Structural Hazard</h4>
      <p>Two instructions try to use the same hardware resource at the same time (e.g., memory access conflict).</p>
      <p style="margin-top:4px; font-size:0.85rem;"><strong>Example:</strong></p>
      <div class="code-block" style="font-size:0.75rem;">
LOAD R1, X     <span style="color:#546e7a;">// Need memory</span>

addSlide(`

// SLIDE 12 – INTERRUPT HANDLING IN RISC AND CISC
// ==================================================================
addSlide(`
  <div class="section-badge">15.1 Processors</div>
  <h2>Interrupt Handling — RISC vs CISC</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div class="card">
      <h4>RISC Interrupt Handling</h4>
      <ul>
        <li><strong>Simple instructions</strong> make it easier to identify safe interrupt points</li>
        <li><strong>Fixed instruction length</strong> makes state saving more predictable</li>
        <li><strong>Many registers</strong> allow faster context saving</li>
        <li>Pipeline may need to be <strong>flushed or stalled</strong> on interrupt</li>
        <li>State saving is helped by regular, uniform register use</li>
        <li>Often faster interrupt response times</li>
      </ul>
    </div>
    <div class="card">
      <h4>CISC Interrupt Handling</h4>
      <ul>
        <li><strong>Complex instructions</strong> may take many cycles to complete</li>
        <li><strong>Variable instruction length</strong> makes interrupt points harder to manage</li>
        <li>Interrupt may need to wait until a complex instruction <strong>finishes</strong></li>
        <li>More complex decoding state makes context saving <strong>more complicated</strong></li>
        <li>More <strong>hardware logic</strong> needed to manage interrupt handling</li>
      </ul>
    </div>
  </div>
  <div class="exam-tip-box mt-6">
    <h4>Exam Tip</h4>
    <p>Avoid saying CISC “cannot handle interrupts”. <strong>Both</strong> RISC and CISC processors handle interrupts; the difference is mainly in <strong>complexity and predictability</strong>. RISC tends to have simpler, more predictable interrupt handling.</p>
  </div>
`);

addSlide(`

// SLIDE 43 – BOOLEAN ALGEBRA LAWS
// ==================================================================
addSlide(`
  <div class="section-badge">15.2 Boolean Algebra</div>
  <h2>Boolean Algebra Laws</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <table>
    <thead>
      <tr><th>Law</th><th>AND Form</th><th>OR Form</th><th>Example</th></tr>
    </thead>
    <tbody>
      <tr><td><strong>Identity</strong></td><td>A · 1 = A</td><td>A + 0 = A</td><td>Leaves value unchanged</td></tr>
      <tr><td><strong>Null (Annulment)</strong></td><td>A · 0 = 0</td><td>A + 1 = 1</td><td>Force result to 0 or 1</td></tr>
      <tr><td><strong>Idempotent</strong></td><td>A · A = A</td><td>A + A = A</td><td>Repeated same value</td></tr>
      <tr><td><strong>Complement</strong></td><td>A · A' = 0</td><td>A + A' = 1</td><td>Inverse cancels</td></tr>
      <tr><td><strong>Double Negation</strong></td><td>(A')' = A</td><td colspan="2">Two NOTs cancel out</td></tr>
      <tr><td><strong>Commutative</strong></td><td>A · B = B · A</td><td>A + B = B + A</td><td>Order does not matter</td></tr>
      <tr><td><strong>Associative</strong></td><td>(A·B)·C = A·(B·C)</td><td>(A+B)+C = A+(B+C)</td><td>Grouping does not matter</td></tr>
      <tr><td><strong>Distributive</strong></td><td>A·(B+C) = AB+AC</td><td>A+BC = (A+B)(A+C)</td><td>Factorising expressions</td></tr>
    </tbody>
  </table>
  <div class="callout info mt-6">
    <strong>Note:</strong> The Distributive law for OR (A + BC = (A + B)(A + C)) does <strong>not</strong> exist in normal algebra — it is unique to Boolean algebra!
  </div>
`);

addSlide(`

addSlide(`

addSlide(`

addSlide(`
  <div class="section-badge">15.2 Karnaugh Maps</div>
  <h2>Common K-map Mistakes — Summary</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div class="common-mistake-box">
      <h4>⚠️ Mistake 1: Wrong column order</h4>
      <p>Using binary order (00, 01, 10, 11) instead of <strong>Gray code</strong> (00, 01, 11, 10).</p>
      <p>This breaks the adjacency rule — adjacent cells would differ by 2 bits instead of 1.</p>
    </div>
    <div class="common-mistake-box">
      <h4>⚠️ Mistake 2: Wrong group sizes</h4>
      <p>Groups must be <strong>powers of 2</strong>: 1, 2, 4, 8, 16. A group of 3 or 6 cells is invalid.</p>
    </div>
    <div class="common-mistake-box">
      <h4>⚠️ Mistake 3: Forgetting wrap-around</h4>
      <p>Cells on the <strong>top edge connect to the bottom</strong>; cells on the <strong>left connect to the right</strong>.</p>
    </div>
    <div class="common-mistake-box">
      <h4>⚠️ Mistake 4: Grouping zeros</h4>
      <p>Only group the <strong>1s</strong>! Grouping 0s gives the complement of the function (though this can be useful for simplification using Product of Sums).</p>
    </div>
  </div>
`);
