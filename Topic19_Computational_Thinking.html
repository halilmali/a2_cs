<div class="presentation" id="presentation"></div>
<div class="nav-bar">
  <button id="prevBtn" onclick="changeSlide(-1)">&#9664; Prev</button>
  <span class="slide-counter" id="slideCounter">1 / 1</span>
  <div class="progress-dots" id="progressDots"></div>
  <button id="nextBtn" onclick="changeSlide(1)">Next &#9654;</button>

<script>
const slides = [];
function addSlide(html) { slides.push(html); }
function renderSlides() {
  const container = document.getElementById('presentation');
  slides.forEach((html, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.dataset.slide = i + 1;
    div.innerHTML = html;
    container.appendChild(div);
  });
  renderDots();
  updateNav();
}
function renderDots() {
  const dots = document.getElementById('progressDots');
  if (!dots) return;
  dots.innerHTML = '';
  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === currentSlide ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    dots.appendChild(dot);
  });
}
let currentSlide = 0;
function changeSlide(dir) {
  const next = currentSlide + dir;
  if (next < 0 || next >= slides.length) return;
  goToSlide(next);
}
function goToSlide(idx) {
  const all = document.querySelectorAll('.slide');
  all.forEach(s => s.classList.remove('active'));
  all[idx].classList.add('active');
  currentSlide = idx;
  const counter = document.getElementById('slideCounter');
  if (counter) counter.textContent = (idx + 1) + ' / ' + slides.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === slides.length - 1;
  renderDots();
  all[idx].scrollTop = 0;
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeSlide(-1);
});
function updateNav() {
  const counter = document.getElementById('slideCounter');
  if (counter) counter.textContent = '1 / ' + slides.length;
  document.getElementById('prevBtn').disabled = true;
  if (slides.length <= 1) document.getElementById('nextBtn').disabled = true;
}

addSlide(`
  <div class="section-badge">19.1 Searching</div>
  <h2>Linear Search Algorithm (Pseudocode)</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="worked-example">
    <h4>Pseudocode Implementation</h4>
    <div class="code-block">\nFUNCTION LinearSearch(arr, target)\n    FOR i \u2190 0 TO LENGTH(arr) - 1\n        IF arr[i] = target THEN\n            RETURN i     // Found: return index\n        ENDIF\n    NEXT i\n    RETURN -1             // Not found\nENDFUNCTION</div>

  </div>
`);

addSlide(`
  <div class="section-badge">19.1 Searching</div>
  <h2>Binary Search Algorithm (Pseudocode)</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="worked-example">
    <h4>Pseudocode Implementation</h4>
    <div class="code-block">\nFUNCTION BinarySearch(arr, target)\n    low \u2190 0\n    high \u2190 LENGTH(arr) - 1\n    WHILE low \u2264 high\n        mid \u2190 (low + high) DIV 2\n        IF arr[mid] = target THEN\n            RETURN mid      // Found\n        ELSE IF arr[mid] < target THEN\n            low \u2190 mid + 1    // Search right half\n        ELSE\n            high \u2190 mid - 1   // Search left half\n        ENDIF\n    ENDWHILE\n    RETURN -1               // Not found\nENDFUNCTION</div>
  </div>
  <div class="exam-tip-box mt-6">
    <h4>Exam Tip</h4>
    <p>Note the use of <strong>DIV</strong> (integer division) for finding the middle index. The condition <strong>low \u2264 high</strong> ensures the loop continues while the search space is valid.</p>
  </div>
`);

// SLIDE 10 – BUBBLE SORT
// ==================================================================
addSlide(`
  <div class="section-badge">19.1 Sorting</div>
  <h2>Bubble Sort</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>How It Works</h4>
        <ul>
          <li>Repeatedly compares <strong>adjacent elements</strong></li>
          <li>Swaps them if they are in the <strong>wrong order</strong></li>
          <li>Each pass "bubbles" the <strong>largest element</strong> to its correct position</li>
          <li>After each pass, the next largest element is in place</li>
          <li>Process repeats until <strong>no swaps</strong> are needed</li>
        </ul>
      </div>
      <div class="card mt-6">
        <h4>Key Properties</h4>
        <ul>
          <li>Time complexity: <strong>O(n\u00b2)</strong> worst and average case</li>
          <li>Best case: <strong>O(n)</strong> (already sorted, with early exit)</li>
          <li><strong>Stable</strong> sorting algorithm</li>
          <li><strong>In-place</strong> sorting (uses minimal extra memory)</li>
        </ul>
      </div>
    </div>
    <div>
      <div class="key-term-box">
        <h4>Key Term</h4>
        <p><strong>Bubble Sort:</strong> A simple sorting algorithm that repeatedly steps through a list, compares adjacent elements, and swaps them if they are in the wrong order.</p>
      </div>
    </div>
  </div>
`);

// ==================================================================
// SLIDE 11 – BUBBLE SORT PSEUDOCODE
// ==================================================================
addSlide(`
  <div class="section-badge">19.1 Sorting</div>
  <h2>Bubble Sort Algorithm (Pseudocode)</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="worked-example">
    <h4>Pseudocode Implementation</h4>
    <div class="code-block">\nFUNCTION BubbleSort(arr)\n    n \u2190 LENGTH(arr)\n    FOR i \u2190 0 TO n - 2\n        swapped \u2190 FALSE\n        FOR j \u2190 0 TO n - 2 - i\n            IF arr[j] > arr[j + 1] THEN\n                temp \u2190 arr[j]\n                arr[j] \u2190 arr[j + 1]\n                arr[j + 1] \u2190 temp\n                swapped \u2190 TRUE\n            ENDIF\n        NEXT j\n        IF NOT swapped THEN\n            EXIT FOR        // Early exit if no swaps\n        ENDIF\n    NEXT i\n    RETURN arr\nENDFUNCTION</div>
  </div>
  <div class="exam-tip-box mt-6">
    <h4>Exam Tip</h4>
    <p>The inner loop goes to <strong>n - 2 - i</strong> because after each pass, the largest i+1 elements are already in place. The <strong>swapped</strong> flag allows early exit if the list is already sorted.</p>
  </div>
`);

// SLIDE 13 – INSERTION SORT
// ==================================================================
addSlide(`
  <div class="section-badge">19.1 Sorting</div>
  <h2>Insertion Sort</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>How It Works</h4>
        <ul>
          <li>Builds the sorted list <strong>one element at a time</strong></li>
          <li>Takes one element from the input and <strong>inserts it</strong> into the correct position</li>
          <li>The sorted portion grows from left to right</li>
          <li>Elements are <strong>shifted right</strong> to make space</li>
        </ul>
      </div>
      <div class="card mt-6">
        <h4>Key Properties</h4>
        <ul>
          <li>Time complexity: <strong>O(n\u00b2)</strong> worst and average case</li>
          <li>Best case: <strong>O(n)</strong> (already sorted)</li>
          <li><strong>Stable</strong> and <strong>in-place</strong></li>
          <li>Performs well on <strong>small</strong> or <strong>nearly sorted</strong> lists</li>
        </ul>
      </div>
    </div>
    <div>
      <div class="key-term-box">
        <h4>Key Term</h4>
        <p><strong>Insertion Sort:</strong> A sorting algorithm that builds a sorted array one element at a time by repeatedly inserting the next element into its correct position.</p>
      </div>
      <div class="callout info mt-6">
        <strong>Analogy:</strong> Sorting a hand of playing cards by picking up one card at a time and inserting it into the correct position among already-sorted cards.
      </div>
    </div>
  </div>
`);

// ==================================================================
// SLIDE 14 – INSERTION SORT PSEUDOCODE
// ==================================================================
addSlide(`
  <div class="section-badge">19.1 Sorting</div>
  <h2>Insertion Sort Algorithm (Pseudocode)</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="worked-example">
    <h4>Pseudocode Implementation</h4>
    <div class="code-block">\nFUNCTION InsertionSort(arr)\n    FOR i \u2190 1 TO LENGTH(arr) - 1\n        key \u2190 arr[i]\n        j \u2190 i - 1\n        WHILE j \u2265 0 AND arr[j] > key\n            arr[j + 1] \u2190 arr[j]\n            j \u2190 j - 1\n        ENDWHILE\n        arr[j + 1] \u2190 key\n    NEXT i\n    RETURN arr\nENDFUNCTION</div>
  </div>
  <div class="exam-tip-box mt-6">
    <h4>Exam Tip</h4>
    <p>The outer loop (i) starts at <strong>index 1</strong>, not 0, because the first element (index 0) is trivially sorted. The <strong>key</strong> is the element being inserted. Elements greater than the key are shifted right.</p>
  </div>
`);

addSlide(`

        <li>For large datasets (e.g., 10,000+ items), these sorts become <strong>impractical</strong></li>

`);

// SLIDE 26 – WHAT IS RECURSION?
// ==================================================================
addSlide(`
  <div class="section-badge">19.2 Recursion</div>
  <h2>What Is Recursion?</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>Definition</h4>
        <p><strong>Recursion</strong> is a technique where a function <strong>calls itself</strong> to solve a problem by breaking it into smaller sub-problems.</p>
        <p style="margin-top:6px;">Each recursive call works on a <strong>smaller instance</strong> of the original problem.</p>
      </div>
      <div class="card mt-6">
        <h4>Key Idea</h4>
        <p>A recursive function solves a problem by:</p>
        <ol>
          <li>Handling the <strong>smallest case</strong> directly (base case)</li>
          <li>Calling <strong>itself</strong> with a smaller version of the problem</li>
        </ol>
      </div>
    </div>
    <div>
      <div class="key-term-box">
        <h4>Key Term</h4>
        <p><strong>Recursion:</strong> A programming technique where a function calls itself to solve a problem by dividing it into smaller, similar sub-problems.</p>
      </div>
      <div class="callout info mt-6">
        <strong>Analogy:</strong> Russian nesting dolls (matryoshka). Opening each doll reveals a smaller version of itself, until you reach the smallest one (base case).
      </div>
    </div>
  </div>
`);

// ==================================================================
// SLIDE 27 – BASE CASE AND RECURSIVE CASE
// ==================================================================
addSlide(`
  <div class="section-badge">19.2 Recursion</div>
  <h2>Base Case and Recursive Case</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>Every Recursive Function Needs:</h4>
        <p><strong>1. Base Case</strong></p>
        <ul>
          <li>The simplest version of the problem</li>
          <li>Can be solved <strong>directly</strong> without recursion</li>
          <li><strong>Stops</strong> the recursion</li>
          <li>Without it, the function would call itself forever (stack overflow)</li>
        </ul>
      </div>
      <div class="card mt-6">
        <h4>2. Recursive Case</h4>
        <ul>
          <li>Breaks the problem into a <strong>smaller sub-problem</strong></li>
          <li>Makes a <strong>recursive call</strong> to solve the sub-problem</li>
          <li>Moves <strong>towards</strong> the base case</li>
        </ul>
      </div>
    </div>
    <div class="worked-example">
      <h4>General Structure</h4>
      <div class="code-block">\nFUNCTION RecursiveFunc(n)\n    IF baseCondition THEN\n        RETURN baseValue   // Base case\n    ELSE\n        RETURN RecursiveFunc(smallerN)  // Recursive case\n    ENDIF\nENDFUNCTION</div>
      <p style="margin-top:6px;">The base case <strong>must</strong> be reachable, otherwise infinite recursion occurs.</p>
    </div>
  </div>
`);

// SLIDE 33 – RECURSIVE VS ITERATIVE SOLUTIONS

addSlide(`
  <div class="section-badge">19.2 Recursion</div>
  <h2>Recursive vs Iterative Solutions</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div class="worked-example">
      <h4>Iterative Factorial</h4>
      <div class="code-block">\nFUNCTION FactorialIter(n)\n    result \u2190 1\n    FOR i \u2190 1 TO n\n        result \u2190 result * i\n    NEXT i\n    RETURN result\nENDFUNCTION</div>
      <p>Uses a loop. No recursive calls. <strong>O(n)</strong> time, <strong>O(1)</strong> space.</p>
    </div>
    <div class="worked-example">
      <h4>Recursive Factorial</h4>
      <div class="code-block">\nFUNCTION FactorialRec(n)\n    IF n = 0 THEN\n        RETURN 1\n    ELSE\n        RETURN n * FactorialRec(n-1)\n    ENDIF\nENDFUNCTION</div>
      <p>Calls itself. Uses call stack. <strong>O(n)</strong> time, <strong>O(n)</strong> stack space.</p>
    </div>
  </div>
  <div class="card mt-6">
    <h4>Which Should You Use?</h4>
    <ul>
      <li><strong>Iteration</strong> is usually more <strong>efficient</strong> (less memory, no function call overhead)</li>
      <li><strong>Recursion</strong> can be <strong>more elegant</strong> for naturally recursive problems (tree traversal, divide-and-conquer)</li>
      <li>Many problems can be solved either way — choose based on <strong>clarity and constraints</strong></li>
    </ul>
  </div>
`);

// SLIDE 35 – RECURSION WORKED EXAMPLE: BINARY SEARCH (RECURSIVE)

addSlide(`
  <div class="section-badge">19.2 Recursion</div>
  <h2>Recursive Binary Search</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="worked-example">
        <h4>Recursive Pseudocode</h4>
        <div class="code-block">\nFUNCTION BinarySearchRec(arr,\n    low, high, target)\n    \n    IF low > high THEN\n        RETURN -1      // Base: not found\n    ENDIF\n    \n    mid \u2190 (low + high) DIV 2\n    \n    IF arr[mid] = target THEN\n        RETURN mid     // Base: found\n    ELSE IF arr[mid] < target THEN\n        RETURN BinarySearchRec(arr,\n            mid+1, high, target)\n    ELSE\n        RETURN BinarySearchRec(arr,\n            low, mid-1, target)\n    ENDIF\nENDFUNCTION</div>
      </div>
    </div>
    <div>
      <div class="card">
        <h4>Trace: Array[3,9,12,17], Target=17</h4>
        <table class="trace-table">
          <thead>
            <tr><th>Call</th><th>low</th><th>high</th><th>mid</th><th>arr[mid]</th><th>Action</th></tr>
          </thead>
          <tbody>
            <tr><td>1</td><td>0</td><td>3</td><td>1</td><td>9</td><td>9<17, search right</td></tr>
            <tr><td>2</td><td>2</td><td>3</td><td>2</td><td>12</td><td>12<17, search right</td></tr>
            <tr><td><strong>3</strong></td><td><strong>3</strong></td><td><strong>3</strong></td><td><strong>3</strong></td><td><strong>17</strong></td><td><strong>Found! Return 3</strong></td></tr>
          </tbody>
        </table>
      </div>
      <div class="exam-tip-box mt-6">
        <h4>Exam Tip</h4>
        <p>The recursive version of binary search has <strong>two base cases</strong>: (1) low > high → not found, (2) arr[mid] = target → found. Each recursive call narrows the search range.</p>
      </div>
    </div>
  </div>
`);

addSlide(`
  <div class="section-badge">19.2 Recursion</div>
  <h2>Limitations of Recursion</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div class="card">
      <h4>Disadvantages</h4>
      <ul>
        <li><strong>Memory overhead:</strong> Each call uses stack space (O(n) space)</li>
        <li><strong>Risk of stack overflow</strong> if recursion is too deep</li>
        <li><strong>Slower</strong> than iteration due to function call overhead</li>
        <li>Can be <strong>harder to debug</strong> (many nested calls)</li>
        <li><strong>Inefficient</strong> if the same sub-problem is solved multiple times</li>
      </ul>
    </div>
    <div class="card">
      <h4>Example: Fibonacci Inefficiency</h4>
      <p>Recursive Fib(5) computes Fib(3) twice, Fib(2) three times:</p>
      <ul>
        <li>Fib(5) = Fib(4) + Fib(3)</li>
        <li>Fib(4) = Fib(3) + Fib(2)</li>
        <li>Fib(3) = Fib(2) + Fib(1)</li>
        <li><strong>Fib(3) is called twice!</strong></li>
      </ul>
      <p style="margin-top:4px;">Time: <strong>O(2\u207f)</strong> vs iterative <strong>O(n)</strong></p>
    </div>
  </div>
  <div class="common-mistake-box mt-6">
    <h4>Common Mistake</h4>
    <p>Forgetting the <strong>base case</strong>, or having a recursive case that does not move towards the base case, causes <strong>infinite recursion</strong> and eventually a <strong>stack overflow</strong>.</p>
  </div>
`);

      <tr><td><strong>Code length</strong></td><td>Often shorter and more elegant</td><td>May be longer for complex problems</td></tr>

`);
