<body>
<div class="presentation" id="presentation"></div>
<div class="nav-bar">
  <button id="prevBtn" onclick="changeSlide(-1)">&#9664; Prev</button>
  <span class="slide-counter" id="slideCounter">1 / 1</span>
  <div class="progress-dots" id="progressDots"></div>
  <button id="nextBtn" onclick="changeSlide(1)">Next &#9654;</button>
</div>
<div class="kbd-hint">&#8592; &#8594; arrow keys to navigate</div>
<script>
const slides = [];
function addSlide(html) { slides.push(html); }
function renderSlides() {
  const container = document.getElementById('presentation');
  slides.forEach((html, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.dataset.slide = i + 1;
    div.innerHTML = html;
    container.appendChild(div);
  });
  renderDots();
  updateNav();
}
function renderDots() {
  const dots = document.getElementById('progressDots');
  if (!dots) return;
  dots.innerHTML = '';
  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === currentSlide ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    dots.appendChild(dot);
  });
}
let currentSlide = 0;
function changeSlide(dir) {
  const next = currentSlide + dir;
  if (next < 0 || next >= slides.length) return;
  goToSlide(next);
}
function goToSlide(idx) {
  const all = document.querySelectorAll('.slide');
  all.forEach(s => s.classList.remove('active'));
  all[idx].classList.add('active');
  currentSlide = idx;
  const counter = document.getElementById('slideCounter');
  if (counter) counter.textContent = (idx + 1) + ' / ' + slides.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === slides.length - 1;
  renderDots();
  all[idx].scrollTop = 0;
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeSlide(-1);
});
function updateNav() {
  const counter = document.getElementById('slideCounter');
  if (counter) counter.textContent = '1 / ' + slides.length;
  document.getElementById('prevBtn').disabled = true;
  if (slides.length <= 1) document.getElementById('nextBtn').disabled = true;
}
// SLIDES START HERE

// SLIDE 2 – WHAT IS A PROGRAMMING PARADIGM?
// ==================================================================
addSlide(`
  <div class="section-badge">20.1 Programming Paradigms</div>
  <h2>What Is a Programming Paradigm?</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>Definition</h4>
        <p>A <strong>programming paradigm</strong> is a style or approach to programming.</p>
        <ul>
          <li>It influences <strong>how</strong> programs are written</li>
          <li>It shapes how problems are <strong>broken down</strong></li>
          <li>Different paradigms suit <strong>different problem types</strong></li>
          <li>Some languages support <strong>multiple paradigms</strong></li>
        </ul>
      </div>
    </div>
    <div>
      <div class="key-term-box">
        <h4>Key Term</h4>
        <p><strong>Programming Paradigm:</strong> A way of thinking about how to solve a problem using a program, defining the structure and capability of a programming language.</p>
      </div>
      <div class="callout info mt-6">
        <strong>Analogy:</strong> Different paradigms are like different tools in a toolbox. A hammer is best for nails, a screwdriver for screws. Similarly, different paradigms are suited to different programming problems.
      </div>
    </div>
  </div>
`);

// SLIDE 3 – OVERVIEW OF PROGRAMMING PARADIGMS
// ==================================================================
addSlide(`
  <div class="section-badge">20.1 Programming Paradigms</div>
  <h2>Overview of Programming Paradigms</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div class="card">
      <h4>1. Low-Level Programming</h4>
      <p>Instructions close to machine code. Direct hardware control using mnemonics and addressing modes.</p>
      <p><em>Example: Assembly language</em></p>
    </div>
    <div class="card">
      <h4>2. Imperative (Procedural)</h4>
      <p>Step-by-step instructions that change program state. Uses variables, loops, conditionals, procedures and functions.</p>
      <p><em>Example: Pascal, C, Python</em></p>
    </div>
    <div class="card">
      <h4>3. Object-Oriented (OOP)</h4>
      <p>Programs are organised around objects containing data and methods. Uses classes, inheritance, polymorphism, encapsulation.</p>
      <p><em>Example: Java, C++, Python</em></p>
    </div>
    <div class="card">
      <h4>4. Declarative Programming</h4>
      <p>Program describes <strong>what</strong> the result should be, not <strong>how</strong> to achieve it. Uses facts, rules, and goals.</p>
      <p><em>Example: Prolog, SQL</em></p>
    </div>
  </div>
  <div class="exam-tip-box mt-6">

`);

addSlide(`
  <div class="section-badge">20.1 Low-Level Programming</div>

  <div class="grid-2">
    <div>

        <h4>Key Characteristics</h4>
        <ul>

          <li>Uses <strong>mnemonics</strong> (abbreviations) for instructions</li>
          <li>Uses <strong>addressing modes</strong> to access data</li>

      </div>

        <p>Do not confuse <strong>low-level</strong> with <strong>imperative</strong>. Low-level means close to machine code. Imperative means step-by-step. A high-level language can also be imperative.</p>

  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="card">
    <h4>What Is an Addressing Mode?</h4>
    <p>The addressing mode determines <strong>how the operand</strong> of an instruction is interpreted.</p>
    <p>Different modes allow different ways to access data in memory.</p>
  </div>
  <p style="margin-top:6px;">There are <strong>five</strong> addressing modes you need to know:</p>
  <div class="grid-2 mt-6">
    <div class="card"><h4>1. Immediate</h4><p>Operand is the actual value</p></div>
    <div class="card"><h4>2. Direct</h4><p>Operand is the memory address</p></div>
    <div class="card"><h4>3. Indirect</h4><p>Operand points to an address containing the address</p></div>
    <div class="card"><h4>4. Indexed</h4><p>Address = base + index register</p></div>
    <div class="card"><h4>5. Relative</h4><p>Address = PC + offset</p></div>
  </div>
`);

        <h4>Key Term</h4>

// ==================================================================

addSlide(`

// ==================================================================
// SLIDE 15 – INTRODUCTION TO OOP
// ==================================================================
addSlide(`
  <div class="section-badge">20.1 OOP</div>
  <h2>Object-Oriented Programming (OOP)</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>

    <div>

        <h4>Key Concepts</h4>
        <ul>
          <li>Programs are organised around <strong>objects</strong></li>
          <li>An <strong>object</strong> contains <strong>data</strong> (attributes) and <strong>methods</strong> (behaviours)</li>
          <li>A <strong>class</strong> is a template/blueprint for creating objects</li>
          <li>Key principles: <strong>encapsulation, inheritance, polymorphism</strong></li>
        </ul>
      </div>
    </div>
    <div>
      <div class="key-term-box">

        <p><strong>Class:</strong> A blueprint that defines the structure (attributes) and behaviour (methods) that objects of that class will have.</p>

      </div>
      <div class="callout info mt-6">
        <strong>Analogy:</strong> A class is like a blueprint for a house. The objects are the actual houses built from that blueprint. Each house has the same structure but different values (different address, colour, etc.).

`);

// ==================================================================
// SLIDE 16 – ENCAPSULATION
// ==================================================================
addSlide(`
  <div class="section-badge">20.1 OOP</div>
  <h2>Encapsulation</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>Definition</h4>
        <p><strong>Encapsulation</strong> means bundling <strong>data</strong> and <strong>methods</strong> together within a class and <strong>restricting direct access</strong> to some of the object's components.</p>
        <ul>
          <li><strong>Private</strong> attributes: accessible only within the class</li>
          <li><strong>Public</strong> methods: provide controlled access to private data</li>
          <li>Protects data from <strong>unauthorised modification</strong></li>
          <li>Also called <strong>information hiding</strong></li>
        </ul>
      </div>
    </div>
    <div>
      <div class="worked-example">
        <h4>Pseudocode Example</h4>
        <div class="code-block">CLASS BankAccount<br>    PRIVATE balance : INTEGER<br><br>    PUBLIC METHOD Init()<br>        balance &larr; 0<br>    ENDMETHOD<br><br>    PUBLIC METHOD Deposit(amount)<br>        balance &larr; balance + amount<br>    ENDMETHOD<br><br>    PUBLIC METHOD GetBalance()<br>        RETURN balance<br>    ENDMETHOD<br>ENDCLASS</div>
      </div>
      <div class="key-term-box mt-6">
        <h4>Key Term</h4>
        <p><strong>Encapsulation:</strong> Bundling data and methods within a class and restricting external access to the internal data.</p>
      </div>
    </div>
  </div>
`);

// ==================================================================
// SLIDE 17 – INHERITANCE
// ==================================================================
addSlide(`
  <div class="section-badge">20.1 OOP</div>
  <h2>Inheritance</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>Definition</h4>
        <p><strong>Inheritance</strong> allows a class (child/subclass) to inherit <strong>attributes and methods</strong> from another class (parent/superclass).</p>
        <ul>
          <li>The child class can <strong>reuse</strong> code from the parent</li>
          <li>The child class can <strong>add</strong> new attributes and methods</li>
          <li>The child class can <strong>override</strong> inherited methods</li>
          <li>Promotes <strong>code reuse</strong> and establishes a <strong>hierarchy</strong></li>
        </ul>
      </div>
    </div>
    <div>
      <div class="worked-example">
        <h4>Pseudocode Example</h4>
        <div class="code-block">CLASS Animal<br>    PUBLIC METHOD Speak()<br>        OUTPUT "Animal sound"<br>    ENDMETHOD<br>ENDCLASS<br><br>CLASS Dog INHERITS Animal<br>    PUBLIC METHOD Speak()<br>        OUTPUT "Woof!"<br>    ENDMETHOD<br>ENDCLASS</div>
        <p>Dog inherits from Animal and overrides Speak().</p>
      </div>
      <div class="key-term-box mt-6">
        <h4>Key Term</h4>
        <p><strong>Inheritance:</strong> A mechanism where a class acquires the properties and methods of another class.</p>
      </div>
    </div>
  </div>
`);

// ==================================================================
// SLIDE 18 – POLYMORPHISM
// ==================================================================
addSlide(`
  <div class="section-badge">20.1 OOP</div>
  <h2>Polymorphism</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>Definition</h4>
        <p><strong>Polymorphism</strong> means "many forms" — the same method name can behave <strong>differently</strong> for different classes.</p>
        <ul>
          <li>Allows objects of different classes to be treated <strong>uniformly</strong></li>
          <li>Each class implements the method in its <strong>own way</strong></li>
          <li>Often used with <strong>inheritance</strong> and <strong>method overriding</strong></li>
        </ul>
      </div>
    </div>
    <div>
      <div class="worked-example">
        <h4>Polymorphism in Action</h4>
        <div class="code-block">CLASS Animal<br>    METHOD MakeSound()<br>    ENDMETHOD<br>ENDCLASS<br><br>CLASS Dog INHERITS Animal<br>    METHOD MakeSound()<br>        OUTPUT "Woof"<br>    ENDMETHOD<br>ENDCLASS<br><br>CLASS Cat INHERITS Animal<br>    METHOD MakeSound()<br>        OUTPUT "Meow"<br>    ENDMETHOD<br>ENDCLASS</div>
        <p>Both Dog and Cat have MakeSound(), but the output is different.</p>
      </div>
      <div class="key-term-box mt-6">
        <h4>Key Term</h4>
        <p><strong>Polymorphism:</strong> The ability of different classes to respond to the same method call in their own way.</p>
      </div>
    </div>
  </div>
`);

addSlide(`

        <p><strong>Declarative programming</strong> describes <strong>what</strong> the result should be, not <strong>how</strong> to achieve it.</p>

          <li>The programmer defines <strong>facts</strong> and <strong>rules</strong></li>
          <li>The system uses a <strong>query</strong> (goal) to find a solution</li>

      </div>
      <div class="callout info mt-6">

    </div>

`);

addSlide(`
  <div class="section-badge">20.2 Exception Handling</div>

// ==================================================================
// SLIDE 33 – EXCEPTION HANDLING PSEUDOCODE
// ==================================================================
addSlide(`
  <div class="section-badge">20.2 Exception Handling</div>
  <h2>Exception Handling in Pseudocode</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="worked-example">
    <h4>Basic Structure</h4>
    <div class="code-block">TRY<br>    // Code that may cause an error<br>    fileHandle &larr; OPENFILE("data.txt", "r")<br>    content &larr; READFILE(fileHandle)<br>    CLOSEFILE(fileHandle)<br>CATCH<br>    // Code to handle the error<br>    OUTPUT "File could not be read"<br>ENDTRY</div>
  </div>
  <div class="grid-2 mt-6">
    <div class="card">
      <h4>Multiple Catch Blocks</h4>
      <p>Some languages allow catching specific exception types:</p>
      <div class="code-block" style="font-size:0.78rem;">TRY<br>    // risky code<br>CATCH FileNotFoundException<br>    // handle missing file<br>CATCH DivideByZeroException<br>    // handle division by zero<br>ENDTRY</div>
    </div>
    <div class="card">
      <h4>Using THROW</h4>
      <p>Manually raise an exception:</p>
      <div class="code-block" style="font-size:0.78rem;">IF age < 0 THEN<br>    THROW "Invalid age"<br>ENDIF</div>
      <p>The THROW statement creates and raises an exception, which can be caught by a CATCH block.</p>
    </div>
  </div>
`);

// ==================================================================
// SLIDE 34 – EXCEPTION HANDLING WORKED EXAMPLE
// ==================================================================
addSlide(`
  <div class="section-badge">20.2 Exception Handling</div>
  <h2>Exception Handling — Worked Example</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="worked-example">
    <h4>Safe Division with Exception Handling</h4>
    <div class="code-block">FUNCTION SafeDivide(a, b)<br>    TRY<br>        IF b = 0 THEN<br>            THROW "Cannot divide by zero"<br>        ENDIF<br>        result &larr; a / b<br>        RETURN result<br>    CATCH<br>        OUTPUT "Error: Division by zero attempted"<br>        RETURN -1<br>    ENDTRY<br>ENDFUNCTION<br><br>// Main program<br>x &larr; SafeDivide(10, 2)  // Returns 5<br>y &larr; SafeDivide(10, 0)  // Outputs error, returns -1<br>OUTPUT x, y</div>
  </div>
  <div class="exam-tip-box mt-6">
    <h4>Exam Tip</h4>
    <p>You may be asked to <strong>write code using exception handling</strong> or to <strong>explain</strong> how TRY-CATCH improves program reliability. Key points: prevents crashes, provides graceful error recovery, separates error handling from normal logic.</p>
  </div>
`);
