<div class="presentation" id="presentation"></div>
<div class="nav-bar">
  <button id="prevBtn" onclick="changeSlide(-1)">&#9664; Prev</button>
  <span class="slide-counter" id="slideCounter">1 / 1</span>
  <div class="progress-dots" id="progressDots"></div>
  <button id="nextBtn" onclick="changeSlide(1)">Next &#9654;</button>
</div>
<div class="kbd-hint">&#8592; &#8594; arrow keys to navigate</div>
<script>
const slides = [];
function addSlide(html) { slides.push(html); }
function renderSlides() {
  const container = document.getElementById('presentation');
  slides.forEach((html, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.dataset.slide = i + 1;
    div.innerHTML = html;
    container.appendChild(div);
  });
  renderDots();
  updateNav();
}
function renderDots() {
  const dots = document.getElementById('progressDots');
  if (!dots) return;
  dots.innerHTML = '';
  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === currentSlide ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    dots.appendChild(dot);
  });
}
let currentSlide = 0;
function changeSlide(dir) {
  const next = currentSlide + dir;
  if (next < 0 || next >= slides.length) return;
  goToSlide(next);
}
function goToSlide(idx) {
  const all = document.querySelectorAll('.slide');
  all.forEach(s => s.classList.remove('active'));
  all[idx].classList.add('active');
  currentSlide = idx;
  const counter = document.getElementById('slideCounter');
  if (counter) counter.textContent = (idx + 1) + ' / ' + slides.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === slides.length - 1;
  renderDots();
  all[idx].scrollTop = 0;
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeSlide(-1);
});
function updateNav() {
  const counter = document.getElementById('slideCounter');
  if (counter) counter.textContent = '1 / ' + slides.length;
  document.getElementById('prevBtn').disabled = true;
  if (slides.length <= 1) document.getElementById('nextBtn').disabled = true;
}

// SLIDE 2 – WHY USER-DEFINED TYPES ARE NECESSARY
// ==================================================================
addSlide(`
  <div class="section-badge">13.1 User-Defined Types</div>
  <h2>Why User-Defined Types Are Necessary</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>The Problem</h4>
        <p>Built-in types (INTEGER, REAL, STRING, CHAR, BOOLEAN, DATE) are sufficient for <strong>simple</strong> problems.</p>
        <p>But <strong>complex problems</strong> require data types that <strong>model real-world entities</strong>.</p>
      </div>
      <div class="card mt-6">
        <h4>Examples</h4>
        <ul>
          <li>A <strong>Student</strong> has a name, ID, date of birth, and grades</li>
          <li>An <strong>Inventory item</strong> has a code, description, price, quantity</li>
          <li>A <strong>Bank account</strong> has an account number, balance, overdraft limit</li>
          <li>None of these can be properly represented by built-in types alone</li>
        </ul>
      </div>
    </div>
    <div>
      <div class="key-term-box">
        <h4>Key Term</h4>
        <p><strong>User-defined data type:</strong> A data type derived from one or more existing data types, used to extend built-in types to meet specific problem requirements.</p>
      </div>
    </div>
  </div>
`);

// ==================================================================
addSlide(`
  <div class="section-badge">13.1 User-Defined Types</div>
  <h2>Non-Composite Types — Enumerated</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>Definition</h4>
        <p>An <strong>enumerated type</strong> is a user-defined type with a <strong>fixed set of named values</strong>.</p>
        <ul>
          <li>Values are <strong>ordered</strong> and can be compared</li>
          <li>Improves <strong>code readability</strong></li>
          <li>Prevents <strong>invalid values</strong></li>
          <li>A <strong>non-composite</strong> type (not built from other types)</li>
        </ul>
      </div>
    </div>
    <div>
      <div class="worked-example">
        <h4>Example: Days of the Week</h4>
        <div class="code-block">TYPE<br>    DayOfWeek = (Monday, Tuesday,<br>                 Wednesday, Thursday,<br>                 Friday, Saturday, Sunday)<br>ENDTYPE<br><br>DECLARE today : DayOfWeek<br>today &larr; Wednesday<br>IF today > Monday THEN<br>    // This is true<br>ENDIF</div>
      </div>
      <div class="exam-tip-box mt-6">
        <h4>Exam Tip</h4>
        <p>Enumerated types are <strong>ordered</strong>. In Cambridge pseudocode, Monday < Tuesday < Wednesday, etc. You can use <strong>comparison operators</strong> on enumerated values.</p>
      </div>
    </div>
  </div>
`);

// ==================================================================
// SLIDE 5 – NON-COMPOSITE: POINTER TYPE
// ==================================================================
addSlide(`
  <div class="section-badge">13.1 User-Defined Types</div>
  <h2>Non-Composite Types — Pointer</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>Definition</h4>
        <p>A <strong>pointer</strong> is a variable that stores the <strong>memory address</strong> of another variable.</p>
        <ul>
          <li>Can be used to create <strong>dynamic data structures</strong> (linked lists, trees)</li>
          <li>Allows indirect access to data</li>
          <li>Can be <strong>dereferenced</strong> to access the value at the pointed address</li>
          <li>A <strong>non-composite</strong> type (stores a single address)</li>
        </ul>
      </div>
    </div>
    <div>
      <div class="worked-example">
        <h4>Example</h4>
        <div class="code-block">TYPE<br>    NodePointer = ^Node  // Pointer to a Node<br>ENDTYPE<br><br>// Node contains data and a pointer<br>TYPE<br>    Node = RECORD<br>        data : INTEGER<br>        next : NodePointer<br>    ENDRECORD<br>ENDTYPE</div>
      </div>
      <div class="key-term-box mt-6">
        <h4>Key Term</h4>
        <p><strong>Pointer:</strong> A variable that stores the memory address of another variable, allowing indirect access to data.</p>
      </div>
    </div>
  </div>
`);

// ==================================================================
addSlide(`
  <div class="section-badge">13.1 User-Defined Types</div>
  <h2>Composite Types — Record</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>Definition</h4>
        <p>A <strong>record</strong> is a composite data type that groups together <strong>related data items</strong> (fields) of possibly different types.</p>
        <ul>
          <li>Fields can be of <strong>different types</strong></li>
          <li>Fields are accessed using <strong>dot notation</strong></li>
          <li>Ideal for representing a <strong>single entity</strong></li>
        </ul>
      </div>
    </div>
    <div>
      <div class="worked-example">
        <h4>Example: Student Record</h4>
        <div class="code-block">TYPE<br>    Student = RECORD<br>        name : STRING<br>        studentID : INTEGER<br>        dateOfBirth : DATE<br>        grades : ARRAY[1:10] OF INTEGER<br>    ENDRECORD<br>ENDTYPE<br><br>DECLARE student1 : Student<br>student1.name &larr; "Alice"<br>student1.studentID &larr; 1001<br>OUTPUT student1.name</div>
      </div>
    </div>
  </div>
`);

// SLIDE 7 – COMPOSITE: SET TYPE
// ==================================================================
addSlide(`
  <div class="section-badge">13.1 User-Defined Types</div>
  <h2>Composite Types — Set</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>Definition</h4>
        <p>A <strong>set</strong> is a composite type that stores an <strong>unordered collection</strong> of distinct values of the same base type.</p>
        <ul>
          <li>Each element can appear at most <strong>once</strong></li>
          <li>Order is <strong>not guaranteed</strong></li>
          <li>Supports set operations: <strong>union, intersection, difference</strong></li>
          <li>Can use operators: <strong>IN, NOT IN</strong></li>
        </ul>
      </div>
    </div>
    <div>
      <div class="worked-example">
        <h4>Example</h4>
        <div class="code-block">TYPE<br>    DayOfWeek = (Mon, Tue, Wed, Thu,<br>                 Fri, Sat, Sun)<br>    Weekend = SET OF DayOfWeek<br>ENDTYPE<br><br>DECLARE weekendDays : Weekend<br>weekendDays &larr; [Sat, Sun]<br><br>IF Mon IN weekendDays THEN<br>    // false - Mon is not in the set<br>ENDIF</div>
      </div>
    </div>
  </div>
`);

      <div class="card">
        <h4>Definition</h4>
        <p>A <strong>class</strong> is a composite type that bundles <strong>data (attributes)</strong> and <strong>methods (behaviours)</strong> together.</p>
        <ul>
          <li>Supports <strong>encapsulation</strong> (public/private)</li>
          <li>Supports <strong>inheritance</strong> (INHERITS keyword)</li>

    </div>
    <div>
      <div class="worked-example">
        <h4>Example: Class Definition</h4>
        <div class="code-block">CLASS Student<br>    PRIVATE name : STRING<br>    PRIVATE id : INTEGER<br><br>    PUBLIC METHOD Init(n, i)<br>        name &larr; n<br>        id &larr; i<br>    ENDMETHOD<br><br>    PUBLIC METHOD GetName()<br>        RETURN name<br>    ENDMETHOD<br>ENDCLASS<br><br>// Creating an object<br>alice &larr; NEW Student("Alice", 1001)</div>
      </div>
    </div>
  </div>
`);

addSlide(`
  <div class="section-badge">13.2 File Organisation</div>

  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>How It Works</h4>
        <ul>
          <li>Records are stored in the <strong>order they were added</strong></li>
          <li>New records are appended to the <strong>end</strong> of the file</li>
          <li>There is <strong>no key order</strong></li>
          <li>Simplest method of file organisation</li>
        </ul>
      </div>

        <ul>

        </ul>
      </div>
    </div>
    <div>
      <div class="card">
        <h4>Uses</h4>
        <ul>
          <li><strong>Log files</strong> (transaction logs, error logs)</li>

          <li>When the order of entry is important</li>
        </ul>
      </div>
      <div class="key-term-box mt-6">
        <h4>Key Term</h4>
        <p><strong>Serial File:</strong> A file where records are stored in the order they are added, with no ordering by key field.</p>

`);

        </ul>
      </div>
    </div>
    <div>

    </div>

`);

// SLIDE 20 – FLOATING-POINT FORMAT

addSlide(`
  <div class="section-badge">13.3 Floating-Point</div>
  <h2>Floating-Point Format</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="card">
    <h4>Key Notation</h4>
    <p style="font-size:1.2rem; text-align:center; padding:8px;"><strong>Value = Mantissa &times; 2<sup>Exponent</sup></strong></p>
  </div>
  <div class="grid-2 mt-6">
    <div class="card">
      <h4>How It Works</h4>
      <ul>
        <li>The <strong>mantissa</strong> holds the significant bits of the number</li>
        <li>The <strong>exponent</strong> shifts the binary point left or right</li>
        <li>Positive exponent = shift right (makes number larger)</li>
        <li>Negative exponent = shift left (makes number smaller)</li>
        <li>Both mantissa and exponent use <strong>two's complement</strong> representation</li>
      </ul>
    </div>
    <div class="worked-example">
      <h4>Example: 8-bit mantissa, 4-bit exponent</h4>
      <p>Mantissa: <span class="inline-code">0110 1000</span><br>Exponent: <span class="inline-code">0011</span> (decimal 3)</p>
      <p style="margin-top:4px;">Value = 0.1101000 &times; 2<sup>3</sup></p>
      <p>= 0.1101000 shift right 3 places</p>
      <p>= <strong>0110.1000</strong></p>
      <p>= 6.5 in denary</p>
    </div>
  </div>
`);

// ==================================================================
// SLIDE 21 – CONVERTING BINARY FLOATING-POINT TO DENARY
// ==================================================================
addSlide(`
  <div class="section-badge">13.3 Floating-Point</div>
  <h2>Converting Binary Floating-Point to Denary</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="worked-example">
    <h4>Step-by-Step Process</h4>
    <ol>
      <li>Write the <strong>mantissa</strong> as a binary number with an implied binary point after the first bit</li>
      <li>Note the <strong>exponent</strong> value (convert from two's complement if negative)</li>
      <li>Shift the binary point: <strong>right</strong> if exponent is positive, <strong>left</strong> if negative</li>
      <li>Convert the resulting binary number to denary</li>
    </ol>
    <div class="grid-2 mt-6">
      <div>
        <h4>Example 1: Positive Exponent</h4>
        <p>Mantissa: <span class="inline-code">0.101 0000</span> (8 bits)<br>Exponent: <span class="inline-code">0011</span> (4 bits, = +3)</p>
        <p>Shift right 3: <span class="inline-code">0101.000</span></p>
        <p>= 4 + 1 = <strong>5.0</strong></p>
      </div>
      <div>
        <h4>Example 2: Negative Exponent</h4>
        <p>Mantissa: <span class="inline-code">0.110 0000</span> (8 bits)<br>Exponent: <span class="inline-code">1101</span> (4 bits, = -3)</p>
        <p>Shift left 3: <span class="inline-code">0.00011</span></p>
        <p>= 1/8 + 1/16 = <strong>0.1875</strong></p>
      </div>
    </div>
  </div>
`);

// ==================================================================
// SLIDE 22 – CONVERTING DENARY TO BINARY FLOATING-POINT
// ==================================================================
addSlide(`
  <div class="section-badge">13.3 Floating-Point</div>
  <h2>Converting Denary to Binary Floating-Point</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="worked-example">
    <h4>Step-by-Step: Convert 10.75 to floating-point (8-bit mantissa, 4-bit exponent)</h4>
    <ol>
      <li><strong>Convert to fixed-point binary:</strong> 10.75 = 1010.11</li>
      <li><strong>Normalise:</strong> shift the binary point so the first digit is after the leading bit<br>1010.11 &rarr; 0.101011 &times; 2<sup>4</sup> (shifted right 4 places)</li>
      <li><strong>Mantissa:</strong> 0.1010110 (pad to 8 bits: 0101 0110)</li>
      <li><strong>Exponent:</strong> 4 in binary = 0100</li>
    </ol>
    <p style="margin-top:8px;"><strong>Result:</strong> Mantissa = <span class="inline-code">0101 0110</span>, Exponent = <span class="inline-code">0100</span></p>
  </div>
  <div class="exam-tip-box mt-6">
    <h4>Exam Tip</h4>
    <p>The <strong>mantissa is always normalised</strong> so the first two bits are different (01 for positive, 10 for negative). This maximises precision by using all available bits meaningfully.</p>
  </div>
`);

      <div class="card">
        <h4>What Is Normalisation?</h4>
        <p>Normalisation ensures the mantissa is in a <strong>standard form</strong> where:</p>
        <ul>
          <li>For <strong>positive</strong> numbers: the first bit is 0 and the second bit is 1</li>
          <li>For <strong>negative</strong> numbers: the first bit is 1 and the second bit is 0</li>
          <li>This means the first <strong>two bits are different</strong></li>
        </ul>
      </div>
      <div class="card mt-6">
        <h4>Why Normalise?</h4>
        <ul>
          <li><strong>Maximises precision</strong> for a given number of bits</li>
          <li>Ensures a <strong>unique representation</strong> for each value</li>
          <li>Makes <strong>comparison</strong> of floating-point numbers consistent</li>
        </ul>
      </div>
    </div>
    <div class="worked-example">
      <h4>Normalisation Example</h4>
      <p>Normalise: 00110100 (8-bit mantissa)</p>
      <p>The first two bits are <strong>00</strong> &rarr; not normalised.</p>
      <p style="margin-top:4px;">Shift left until the first two bits are 01:</p>
      <ul>
        <li>Shift 1: 01101000, exponent -= 1</li>
        <li>First two bits are now <strong>01</strong> &rarr; normalised!</li>
      </ul>
      <p style="margin-top:4px;">So: 0.0110100 &times; 2<sup>e</sup> becomes 0.1101000 &times; 2<sup>e-1</sup></p>
    </div>
  </div>
`);

addSlide(`
  <div class="section-badge">13.3 Floating-Point</div>
  <h2>Rounding Errors</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>What Causes Rounding Errors?</h4>
        <ul>
          <li>The mantissa has a <strong>fixed number of bits</strong></li>
          <li>Some values cannot be represented <strong>exactly</strong></li>
          <li>The least significant bits must be <strong>truncated or rounded</strong></li>
          <li>Similar to 1/3 = 0.333... in decimal</li>
        </ul>
      </div>
      <div class="card mt-6">
        <h4>Example</h5>
        <p>Represent 0.1 in 8-bit binary mantissa:</p>
        <p>0.1 in binary = 0.0001100110011... (repeating)</p>
        <p>With 8 bits: <span class="inline-code">0.0001100</span></p>
        <p>This is an <strong>approximation</strong>, not exact.</p>
      </div>
    </div>
    <div class="card">
      <h4>Consequences</h4>
      <ul>
        <li>Accumulation of rounding errors can affect <strong>large calculations</strong></li>
        <li>Comparing floating-point numbers for <strong>equality</strong> can be unreliable</li>
        <li>Financial calculations may use <strong>fixed-point</strong> instead for precision</li>
        <li>Using a <strong>larger mantissa</strong> reduces but does not eliminate rounding errors</li>
      </ul>
    </div>
  </div>
`);

addSlide(`
  <div class="section-badge">13.3 Floating-Point</div>
  <h2>Underflow and Overflow</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div class="card">
      <h4>Overflow</h4>
      <p>Occurs when a number is <strong>too large</strong> to be represented within the available number of bits.</p>
      <ul>
        <li>The exponent becomes too large for its allocated bits</li>
        <li>Example: Trying to store 2<sup>20</sup> with a 4-bit exponent (max = 2<sup>7</sup>)</li>
        <li>Result: <strong>Error</strong> or the number wraps to an unexpected value</li>
      </ul>
    </div>
    <div class="card">
      <h4>Underflow</h4>
      <p>Occurs when a number is <strong>too small</strong> to be represented.</p>
      <ul>
        <li>The exponent becomes too negative for its allocated bits</li>
        <li>The number is closer to zero than the smallest representable value</li>
        <li>Example: Trying to store 2<sup>-10</sup> with a 4-bit exponent (min = 2<sup>-7</sup>)</li>
        <li>Result: The value is treated as <strong>zero</strong></li>
      </ul>
    </div>
  </div>

`);

addSlide(`

  <h2>Floating-Point Errors — Comparison</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>

    <thead>
      <tr><th>Issue</th><th>Cause</th><th>Result</th><th>How to Reduce</th></tr>

    <tbody>

  <div class="exam-tip-box mt-6">
    <h4>Exam Tip</h4>
    <p>Know the <strong>difference</strong> between underflow and overflow. Overflow = number too large. Underflow = number too small (close to zero). Both relate to the <strong>exponent</strong> being out of range.</p>
  </div>
`);
