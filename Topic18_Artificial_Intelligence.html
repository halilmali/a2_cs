<div class="nav-bar">
  <button id="prevBtn" onclick="changeSlide(-1)">◀ Prev</button>
  <span class="slide-counter" id="slideCounter">1 / 1</span>
  <div class="progress-dots" id="progressDots"></div>

<script>
const slides = [];
function addSlide(html) { slides.push(html); }
function renderSlides() {
  const container = document.getElementById('presentation');
  slides.forEach((html, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.dataset.slide = i + 1;
    div.innerHTML = html;
    container.appendChild(div);
  });
  renderDots();
  updateNav();
}
function renderDots() {
  const dots = document.getElementById('progressDots');
  if (!dots) return;
  dots.innerHTML = '';
  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === currentSlide ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    dots.appendChild(dot);
  });
}
let currentSlide = 0;
function changeSlide(dir) {
  const next = currentSlide + dir;
  if (next < 0 || next >= slides.length) return;
  goToSlide(next);
}
function goToSlide(idx) {
  const all = document.querySelectorAll('.slide');
  all.forEach(s => s.classList.remove('active'));
  all[idx].classList.add('active');
  currentSlide = idx;
  const counter = document.getElementById('slideCounter');
  if (counter) counter.textContent = (idx + 1) + ' / ' + slides.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === slides.length - 1;
  renderDots();
  all[idx].scrollTop = 0;
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeSlide(-1);
});
function updateNav() {
  const counter = document.getElementById('slideCounter');
  if (counter) counter.textContent = '1 / ' + slides.length;
  document.getElementById('prevBtn').disabled = true;
  if (slides.length <= 1) document.getElementById('nextBtn').disabled = true;
}

addSlide(`
  <div class="section-badge">18.1 Dijkstra</div>
  <h2>Dijkstra's Algorithm — Worked Example</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="worked-example">
    <h4>Graph: A(start), B, C, D(goal) — Edges: A-B:4, A-C:2, B-C:1, B-D:5, C-D:8</h4>
    <table>
      <thead>
        <tr><th>Step</th><th>Current</th><th>Distances (A,B,C,D)</th><th>Visited</th><th>Notes</th></tr>
      </thead>
      <tbody>
        <tr><td>0</td><td>—</td><td>(0, ∞, ∞, ∞)</td><td>{}</td><td>Initialise start=0, others=∞</td></tr>
        <tr><td>1</td><td><strong>A</strong></td><td>(0, 4, 2, ∞)</td><td>{A}</td><td>Update B via A, C via A</td></tr>
        <tr><td>2</td><td><strong>C</strong></td><td>(0, <strong>3</strong>, 2, 10)</td><td>{A, C}</td><td>Via C: B improves to 2+1=3, D=2+8=10</td></tr>
        <tr><td>3</td><td><strong>B</strong></td><td>(0, 3, 2, <strong>8</strong>)</td><td>{A, C, B}</td><td>Via B: D improves to 3+5=8</td></tr>
        <tr><td>4</td><td><strong>D</strong></td><td>(0, 3, 2, 8)</td><td>{A, C, B, D}</td><td>Goal reached</td></tr>
      </tbody>
    </table>
    <p style="margin-top:6px;"><strong>Result:</strong> Shortest path from A to D is <strong>A → C → B → D</strong> with total cost <strong>8</strong>.</p>
    <p>Note: Although the direct A → B edge is 4, the path via C (A→C=2, C→B=1) gives B a shorter distance of 3. Then B→D=5 gives D a total of 8. The direct A→B→D would cost 9 (4+5), and A→C→D costs 10 (2+8). Dijkstra correctly finds A → C → B → D as the shortest at cost 8.</p>
  </div>
`);

// SLIDE 11 – INTRODUCTION TO A* ALGORITHM

addSlide(`
  <div class="section-badge">18.1 A* Search</div>
  <h2>Introduction to A* Algorithm</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>Definition</h4>
        <p><strong>A* (A-star)</strong> is a graph search algorithm that finds the shortest path using a <strong>heuristic</strong> to guide the search.</p>
        <ul>
          <li>Combines benefits of <strong>Dijkstra</strong> and <strong>greedy best-first search</strong></li>
          <li>Uses a <strong>heuristic</strong> to estimate distance to the goal</li>
          <li>More <strong>efficient</strong> than Dijkstra for many problems</li>
        </ul>
      </div>
    </div>
    <div>
      <div class="key-term-box">
        <h4>Key Term</h4>
        <p><strong>A* algorithm:</strong> A graph search algorithm that uses a heuristic to find the shortest path more efficiently than Dijkstra's algorithm.</p>
      </div>
    </div>
  </div>
`);

// ==================================================================
// SLIDE 12 – THE A* COST FUNCTION
// ==================================================================
addSlide(`
  <div class="section-badge">18.1 A* Search</div>
  <h2>The A* Cost Function</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="grid-2">
    <div>
      <div class="card">
        <h4>The A* Formula</h4>
        <p style="font-size:1.6rem; text-align:center; padding:10px;"><span class="inline-code" style="font-size:1.3rem;">f(n) = g(n) + h(n)</span></p>
        <ul>
          <li><strong>f(n)</strong> = total estimated cost of the path through node n</li>
          <li><strong>g(n)</strong> = actual cost from the <strong>start</strong> node to node n</li>
          <li><strong>h(n)</strong> = heuristic estimate of the cost from node n to the <strong>goal</strong></li>
        </ul>
      </div>
      <div class="exam-tip-box mt-6">
        <h4>Exam Tip</h4>
        <p>You need to know the formula <strong>f(n) = g(n) + h(n)</strong> and be able to explain each component. The heuristic must be <strong>admissible</strong> (never overestimate the true cost).</p>
      </div>
    </div>
    <div>
      <div class="key-term-box">
        <h4>Key Term</h4>
        <p><strong>Heuristic:</strong> A function that estimates the cost from a node to the goal. It must be <strong>admissible</strong> (never overestimates the true cost) to guarantee an optimal solution.</p>
      </div>
    </div>
  </div>
`);

// ==================================================================
// SLIDE 13 – HOW A* ALGORITHM WORKS
// ==================================================================
addSlide(`
  <div class="section-badge">18.1 A* Search</div>
  <h2>How A* Algorithm Works</h2>
  <div style="width:60px; height:3px; background:#2ac8a0; border-radius:2px; margin-bottom:8px;"></div>
  <div class="worked-example">
    <h4>Step-by-Step Process</h4>
    <ol>
      <li>Add the start node to the <strong>open list</strong> with f = g + h</li>
      <li><strong>While</strong> the open list is not empty:</li>
      <ol style="padding-left:20px;">
        <li>Select the node with the <strong>smallest f value</strong></li>
        <li>If it is the <strong>goal</strong>, reconstruct the path and stop</li>
        <li><strong>Move it</strong> to the closed list (already evaluated)</li>
        <li>For each <strong>neighbour</strong>:</li>
        <ul>
          <li>Calculate g, h, and f</li>
          <li>If not in open or closed, <strong>add it</strong></li>
          <li>If in open list with a higher f, <strong>update it</strong></li>
        </ul>
      </ol>
    </ol>
  </div>
`);

      </div>
    </div>
    <div>
      <div class="key-term-box">

      </div>
    </div>
  </div>
`);

// SLIDE 33 – WHY BACK PROPAGATION IS NEEDED

addSlide(`

// SLIDE 34 – HOW BACK PROPAGATION WORKS

addSlide(`
  <div class="section-badge">18.1 Back Propagation</div>

    <ol>
      <li><strong>Forward pass:</strong> Input data passes through the network to produce an output</li>

      <li><strong>Update weights:</strong> Adjust each weight in the direction that <strong>reduces the error</strong></li>
      <li><strong>Repeat</strong> for many iterations (epochs)</li>

    <div class="diagram-caption">Error flows backwards to calculate gradients for weight updates</div>
  </div>
`);
